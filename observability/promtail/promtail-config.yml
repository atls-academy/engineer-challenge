server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      # Сохраняем имя контейнера в label `container`
      - source_labels: ["__meta_docker_container_name"]
        target_label: "container"

      # Выделяем логи приложения как app="auth-service"
      - source_labels: ["__meta_docker_container_name"]
        regex: ".*/engineer-challenge-app-1"
        target_label: "app"
        replacement: "auth-service"

      # Общий instance label
      - source_labels: ["__meta_docker_container_name"]
        target_label: "instance"

