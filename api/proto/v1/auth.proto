syntax = "proto3";

package auth.v1;

option go_package = "github.com/atrump/engineer-challenge/internal/infra/grpc/pkg;pb";

import "google/protobuf/timestamp.proto";

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  
  rpc InitiatePasswordReset(InitiatePasswordResetRequest) returns (InitiatePasswordResetResponse);
  rpc CompletePasswordReset(CompletePasswordResetRequest) returns (CompletePasswordResetResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
}

message RegisterResponse {
  string user_id = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message InitiatePasswordResetRequest {
  string email = 1;
}

message InitiatePasswordResetResponse {
  string message = 1; // "If email exists, a reset link will be sent"
}

message CompletePasswordResetRequest {
  string token = 1;
  string new_password = 2;
}

message CompletePasswordResetResponse {
  bool success = 1;
}
