services:
  # Наш сервис авторизации
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5555:5555"
    environment:
      - PORT=5555
      - DATABASE_URL=postgres://user:pass@db:5432/auth_db?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  # База данных
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: auth_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5